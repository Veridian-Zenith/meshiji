name: Create Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v2.3.4, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.1.0)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write  # Needed to create a release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxtst-devcd

      - name: Build Linux release
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Meshiji v${{ github.ref_name }}'
          body: |
            ## 🚀 Meshiji v${{ github.ref_name }} Release

            This release includes:

            - Complete code organization improvements
            - Comprehensive keyboard shortcuts
            - Linux XDG trash system compliance
            - Enhanced error handling and performance optimizations

            ## 📦 Downloads

            - [Linux Binary](meshiji-linux-x64.tar.gz)

            ## 🛠️ Build Information

            - Flutter Version: 3.22.0
            - Target Platforms: Linux
            - Release Type: Production

            ## 📋 Changelog

            See the commit history for detailed changes.
          files: |
            build/linux/x64/release/bundle/meshiji
            build/linux/x64/release/bundle/lib/libapp.so
            build/linux/x64/release/bundle/lib/libflutter_linux_gtk.so
            build/linux/x64/release/bundle/data/icudtl.dat
            build/linux/x64/release/bundle/data/flutter_assets/AssetManifest.bin
            build/linux/x64/release/bundle/data/flutter_assets/FontManifest.json
            build/linux/x64/release/bundle/data/flutter_assets/NativeAssetsManifest.json
            build/linux/x64/release/bundle/data/flutter_assets/NOTICES.Z
            build/linux/x64/release/bundle/data/flutter_assets/version.json
            build/linux/x64/release/bundle/data/flutter_assets/fonts/Delius-Regular.ttf
            build/linux/x64/release/bundle/data/flutter_assets/fonts/MaterialIcons-Regular.otf
            build/linux/x64/release/bundle/data/flutter_assets/packages/cupertino_icons/assets/CupertinoIcons.ttf
            build/linux/x64/release/bundle/data/flutter_assets/shaders/ink_sparkle.frag
            build/linux/x64/release/bundle/data/flutter_assets/shaders/stretch_effect.frag
