name: Create Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v2.3.4, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.x.x)'
        required: true
        default: 'v1.2.2-beta'

permissions:
  contents: write  # Needed to create a release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxtst-dev

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux release as tar.xz
        run: |
          cd build/linux/x64/release/bundle
          tar -cJf ../../../meshiji-linux-x64.tar.xz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Meshiji ${{ github.ref_name }}'
          body: |
            ## 🚀 Meshiji ${{ github.ref_name }} Release

            This release includes:

            - Complete code organization improvements
            - Comprehensive keyboard shortcuts
            - Linux XDG trash system compliance
            - Enhanced error handling and performance optimizations

            ## 📦 Downloads

            - [Linux Binary](https://github.com/Veridian-Zenith/meshiji/releases/download/master/meshiji-linux-x64.tar.xz)

            ## 🛠️ Build Information

            - Flutter Version: 3.41.2
            - Target Platforms: Linux
            - Release Type: Production

            ## 📋 Changelog

            See the commit history for detailed changes.
          files: build/linux/meshiji-linux-x64.tar.xz
